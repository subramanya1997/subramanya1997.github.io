---
layout: default
---
{% if page.custom_layout %}
  {{ content }}
{% else %}
<div class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
  </header>

  <article class="post-content">
  {{ content }}
  </article>  
</div>
{% endif %}

<!-- mathjax -->
{% if page.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
