<form
  class="header-search"
  action="{{ '/search/' | prepend: site.baseurl }}"
  method="get"
  role="search"
  aria-label="Site search"
  data-preserve-lang
>
  <label class="sr-only" for="site-search-input">Search posts and books</label>
  <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="11" cy="11" r="8"></circle>
    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
  </svg>
  <input
    type="search"
    id="site-search-input"
    name="q"
    class="header-search-input"
    placeholder="Search posts and books..."
    autocomplete="off"
  >
</form>
