#Bio
bio: I'm a machine learning engineer working on conversational AI, search, and agentic infrastructure for the enterprise. I'm currently the Founding ML Engineer & Lead Architect at Dylog and a Co-Founder of NockOut.
history: I hold an M.S. in Computer Science from UMass Amherst, where I worked on Vision-Language robotics with <a href='https://hcr.cs.umass.edu/people/hzhang'>Prof. Hao Zhang</a> at the <a href='https://hcr.cs.umass.edu'>Human-Centered Robotics Lab</a>. Before that, I led product development at <a href='https://www.renderpub.com'>RenderPub</a> and co-founded Yourkraft and Vayam, a non-profit focused on education.
