name: Update Analytics Data

on:
  schedule:
    # Run daily at 5 PM PST (1 AM UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-analytics-data google-auth

      - name: Fetch Analytics Data
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_CREDENTIALS: ${{ secrets.GA_CREDENTIALS }}
        run: |
          python scripts/fetch_analytics.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add _data/view_count.json
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update view count data"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: update-analytics
    if: needs.update-analytics.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      id-token: write
      pages: write
